- question: "What is the total revenue by month?"
  sql: |
    SELECT
        DATE_TRUNC('month', p.paid_at) AS month,
        ROUND(SUM(p.amount), 2)         AS total_revenue
    FROM payments p
    WHERE p.status = 'completed'
    GROUP BY 1
    ORDER BY 1
  tables_used: [payments]
  notes: "Basic time-series aggregation. Use DATE_TRUNC not strftime for DuckDB."

- question: "Who are the top 5 customers by total spending?"
  sql: |
    SELECT
        c.customer_id,
        c.name,
        ROUND(SUM(p.amount), 2) AS total_spent
    FROM customers c
    JOIN orders o   ON c.customer_id = o.customer_id
    JOIN payments p ON o.order_id    = p.order_id
    WHERE p.status = 'completed'
    GROUP BY c.customer_id, c.name
    ORDER BY total_spent DESC
    LIMIT 5
  tables_used: [customers, orders, payments]

- question: "What is the average product rating per category?"
  sql: |
    SELECT
        p.category,
        ROUND(AVG(r.score), 2) AS avg_rating,
        COUNT(r.review_id)      AS num_reviews
    FROM reviews r
    JOIN products p ON r.product_id = p.product_id
    GROUP BY p.category
    ORDER BY avg_rating DESC
  tables_used: [reviews, products]

- question: "Show me the daily revenue trend for the last 30 days"
  sql: |
    SELECT
        date,
        revenue,
        order_count,
        avg_order_value
    FROM daily_sales
    WHERE date >= CURRENT_DATE - INTERVAL '30 days'
    ORDER BY date
  tables_used: [daily_sales]

- question: "What is the order fulfillment breakdown by status?"
  sql: |
    SELECT
        status,
        COUNT(*)                                                    AS order_count,
        ROUND(100.0 * COUNT(*) / SUM(COUNT(*)) OVER (), 2)         AS pct_of_total
    FROM orders
    GROUP BY status
    ORDER BY order_count DESC
  tables_used: [orders]

- question: "Which products have never been reviewed?"
  sql: |
    SELECT
        p.product_id,
        p.name,
        p.category
    FROM products p
    LEFT JOIN reviews r ON p.product_id = r.product_id
    WHERE r.review_id IS NULL
    ORDER BY p.name
    LIMIT 50
  tables_used: [products, reviews]
  notes: "Tests LEFT JOIN / anti-join pattern."

- question: "What is the month-over-month revenue growth rate?"
  sql: |
    WITH monthly AS (
        SELECT
            DATE_TRUNC('month', paid_at) AS month,
            SUM(amount)                   AS revenue
        FROM payments
        WHERE status = 'completed'
        GROUP BY 1
    )
    SELECT
        month,
        ROUND(revenue, 2)                                                  AS revenue,
        ROUND(LAG(revenue) OVER (ORDER BY month), 2)                       AS prev_revenue,
        ROUND(
            100.0 * (revenue - LAG(revenue) OVER (ORDER BY month))
                  / NULLIF(LAG(revenue) OVER (ORDER BY month), 0),
            2
        ) AS growth_pct
    FROM monthly
    ORDER BY month
  tables_used: [payments]
  notes: "Tests window functions (LAG). Important for demonstrating analytical capability."
