services:
  backend:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app
    environment:
      LYRICS_LAB_CORS_ORIGINS: ${LYRICS_LAB_CORS_ORIGINS:-["http://localhost:5173","http://127.0.0.1:5173"]}
    command: sh -c "pip install -e 'backend[dev]' && python -m lyrics_lab.ingestion.prepare_data && python -m uvicorn lyrics_lab.api.main:app --app-dir backend/src --host 0.0.0.0 --port 8000"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
  frontend:
    image: node:22-alpine
    working_dir: /app/frontend
    volumes:
      - .:/app
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
      VITE_BASE_PATH: ${VITE_BASE_PATH:-/}
    command: sh -c "npm install && npm run build && npx serve -s dist -l 5173"
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend
  portfolio-backend:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app
    environment:
      LYRICS_LAB_CORS_ORIGINS: ${LYRICS_LAB_CORS_ORIGINS:-["https://neojustin.dothost.net","http://localhost:3000","http://127.0.0.1:3000"]}
    command: sh -c "pip install -e 'backend[dev]' && python -m lyrics_lab.ingestion.prepare_data && python -m uvicorn lyrics_lab.api.main:app --app-dir backend/src --host 0.0.0.0 --port 8000"
    ports:
      - "${PORTFOLIO_BACKEND_PORT:-18080}:8000"
  portfolio-frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_BASE_PATH: /p/lyrics-cultural-analytics-lab/
        VITE_API_BASE_URL: /p/lyrics-cultural-analytics-lab/api/v1
    image: justin-portfolio-lyrics-cultural-analytics-lab-frontend
    ports:
      - "${PORTFOLIO_FRONTEND_PORT:-15173}:5173"
    depends_on:
      - portfolio-backend
