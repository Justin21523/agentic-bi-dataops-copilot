version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: agentic-bi:local
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
    env_file: .env
    environment:
      PYTHONPATH: /app/src
      DUCKDB_PATH: data/warehouse.duckdb
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    command: ["uv", "run", "uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: agentic_bi
      POSTGRES_USER: bi_user
      POSTGRES_PASSWORD: bi_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    profiles:
      - postgres

volumes:
  postgres_data:
