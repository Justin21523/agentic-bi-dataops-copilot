name: Deploy to Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: live.dothost.net
          username: neojustin
          password: ${{ secrets.SSH_PASSWORD }}
          port: 2965
          command_timeout: 30m
          script_stop: false
          script: |
            echo "=== PORTFOLIO EXPLORE ==="
            echo "--- content/projects listing ---"
            ls ~/justin-portfolio/content/projects/ 2>/dev/null | head -20
            echo "--- sample project entry ---"
            cat ~/justin-portfolio/content/projects/*.json 2>/dev/null | head -60 || \
            cat ~/justin-portfolio/content/projects/*.md 2>/dev/null | head -60 || \
            ls ~/justin-portfolio/content/projects/ 2>/dev/null
            echo "--- docker-compose.yml snippet ---"
            grep -A10 "agentic\|retailpulse\|fandom\|information-retrieval" ~/justin-portfolio/docker-compose.yml 2>/dev/null | head -80
            echo "--- portfolio docker-compose services count ---"
            grep "^\s*[a-z].*:" ~/justin-portfolio/docker-compose.yml 2>/dev/null | wc -l
            echo "--- projects dir structure ---"
            ls ~/justin-portfolio/projects/ 2>/dev/null | head -5
            cat ~/justin-portfolio/projects/*.json 2>/dev/null | head -60
            echo "=== DONE ==="
