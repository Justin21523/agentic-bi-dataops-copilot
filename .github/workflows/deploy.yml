name: Deploy to Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: live.dothost.net
          username: neojustin
          password: ${{ secrets.SSH_PASSWORD }}
          port: 2965
          command_timeout: 30m
          script_stop: false
          script: |
            echo "=== PORTFOLIO DEEP EXPLORE ==="
            echo "--- one project entry content ---"
            ls ~/justin-portfolio/content/projects/amazon-review-intelligence/ 2>/dev/null
            cat ~/justin-portfolio/content/projects/amazon-review-intelligence/*.json 2>/dev/null | head -80
            cat ~/justin-portfolio/content/projects/amazon-review-intelligence/*.md 2>/dev/null | head -80
            cat ~/justin-portfolio/content/projects/amazon-review-intelligence/index.json 2>/dev/null | head -80
            echo "--- projects list all files in first dir ---"
            find ~/justin-portfolio/content/projects/ -maxdepth 2 -name "*.json" 2>/dev/null | head -5
            find ~/justin-portfolio/content/projects/ -maxdepth 2 -name "*.md" 2>/dev/null | head -5
            echo "--- full project file sample ---"
            FIRST_FILE=$(find ~/justin-portfolio/content/projects/ -maxdepth 2 \( -name "*.json" -o -name "*.md" \) 2>/dev/null | head -1)
            cat "$FIRST_FILE" 2>/dev/null
            echo "--- docker-compose full amazon section ---"
            awk '/amazon-review-intelligence/{found=1} found{print; if(/^$/ && found>1) exit; found++}' ~/justin-portfolio/docker-compose.yml 2>/dev/null | head -30
            echo "=== DONE ==="
