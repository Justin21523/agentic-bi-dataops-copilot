name: Deploy to Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: live.dothost.net
          username: neojustin
          password: ${{ secrets.SSH_PASSWORD }}
          port: 2965
          command_timeout: 30m
          script_stop: false
          script: |
            echo "--- prune docker to free disk space ---"
            docker system prune -f 2>&1 | grep -E "reclaimed|Total"
            df -h / 2>/dev/null | tail -1

            echo "=== [1/6] Update project repo ==="
            if [ -d ~/agentic-bi-dataops-copilot ]; then
              cd ~/agentic-bi-dataops-copilot && git pull origin main
            else
              git clone https://github.com/Justin21523/agentic-bi-dataops-copilot.git ~/agentic-bi-dataops-copilot
            fi
            cd ~/agentic-bi-dataops-copilot
            cp .env.example .env 2>/dev/null || true

            echo "=== [2/6] Portfolio content entry ==="
            CONTENT_DIR=~/justin-portfolio/content/projects/agentic-bi-dataops-copilot
            mkdir -p "$CONTENT_DIR"
            cp ~/agentic-bi-dataops-copilot/portfolio-content/agentic-bi-dataops-copilot/project.override.json "$CONTENT_DIR/" && echo "json OK" || echo "json FAIL"
            cp ~/agentic-bi-dataops-copilot/portfolio-content/agentic-bi-dataops-copilot/en.md "$CONTENT_DIR/" && echo "en.md OK" || echo "en.md FAIL"
            cp ~/agentic-bi-dataops-copilot/portfolio-content/agentic-bi-dataops-copilot/zh-TW.md "$CONTENT_DIR/" && echo "zh-TW.md OK" || echo "zh-TW.md FAIL"

            echo "=== [3/6] Portfolio nginx proxy ==="
            python3 ~/agentic-bi-dataops-copilot/portfolio-content/inject-nginx.py 2>&1 && echo "inject OK" || echo "inject FAIL"

            echo "=== [4/6] Rebuild portfolio ==="
            PUBDIR=~/justin-portfolio/public/portfolio/projects/agentic-bi-dataops-copilot
            mkdir -p "$PUBDIR/screenshots" "$PUBDIR/demo"
            cp ~/agentic-bi-dataops-copilot/portfolio-content/screenshots/*.webp "$PUBDIR/screenshots/" && echo "screenshots copied" || echo "screenshot copy FAIL"
            cp ~/agentic-bi-dataops-copilot/portfolio-content/screenshots/cover.webp "$PUBDIR/cover.webp" && echo "cover.webp copied" || echo "cover copy FAIL"
            cp ~/agentic-bi-dataops-copilot/portfolio-content/demo/demo-tour.webm "$PUBDIR/demo/" && echo "demo-tour.webm copied" || echo "demo copy FAIL"
            echo "--- Restore full scan report (96 projects) to prevent catalog from shrinking ---"
            cp ~/agentic-bi-dataops-copilot/portfolio-content/project-scan-report.json \
               ~/justin-portfolio/data/generated/project-scan-report.json && echo "scan report restored (96 projects)" || echo "scan report copy FAIL"
            python3 -c "f=open('/home/neojustin/justin-portfolio/scripts/catalog/sync-catalog.ts','r+'); c=f.read(); old='link.url.includes(\"neojustin.dothost.net/p/\")'; new='link.url.includes(\"neojustin.dothost.net/p/\") && !link.url.includes(\"agentic-bi-dataops-copilot\")'; nc=c.replace(old,new); f.seek(0); f.write(nc); f.truncate(); f.close(); print('patched' if nc!=c else 'already patched')" 2>&1
            cd ~/justin-portfolio
            npm ci 2>/dev/null || npm install
            npm run build 2>&1 | grep -iE "Saved|Error|agentic"
            docker-compose build web
            docker-compose up -d web
            echo "Portfolio rebuilt."

            echo "=== [5/6] Build and start BI Copilot services ==="
            cd ~/agentic-bi-dataops-copilot
            docker-compose down 2>/dev/null || true
            docker-compose build api
            docker-compose build frontend
            echo "--- Run ETL before API starts (avoids DuckDB lock conflict) ---"
            docker run --rm \
              -v ~/agentic-bi-dataops-copilot/data:/app/data \
              -e PYTHONPATH=/app/src \
              -e DUCKDB_PATH=data/warehouse.duckdb \
              agentic-bi:local \
              uv run python scripts/run_etl.py 2>&1 && echo "ETL OK" || echo "ETL FAIL"
            API_PORT=8003 docker-compose up -d api
            echo "Waiting 30s for API startup..."
            sleep 30
            API_PORT=8003 docker-compose up -d frontend

            echo "=== [6/6] Status check ==="
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" | grep -E "agentic|portfolio-web|NAMES" || true
            curl -s --max-time 10 http://localhost:8003/health && echo " - API healthy" || echo " - API starting..."
            grep -l "agentic-bi-dataops-copilot" ~/justin-portfolio/src/generated/*.json 2>/dev/null && echo "PROJECT IN CATALOG" || echo "not in catalog"
            echo "Live at: https://neojustin.dothost.net/p/agentic-bi-dataops-copilot/"
            echo "=== Deployment complete ==="
