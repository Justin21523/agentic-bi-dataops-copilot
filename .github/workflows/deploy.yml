name: Deploy to Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: live.dothost.net
          username: neojustin
          password: ${{ secrets.SSH_PASSWORD }}
          port: 2965
          command_timeout: 30m
          script_stop: false
          script: |
            set -e

            # ── [1] Update project repo ──────────────────────────────────
            echo "=== [1/6] Update project repo ==="
            if [ -d ~/agentic-bi-dataops-copilot ]; then
              cd ~/agentic-bi-dataops-copilot && git pull origin main
            else
              git clone https://github.com/Justin21523/agentic-bi-dataops-copilot.git ~/agentic-bi-dataops-copilot
              cd ~/agentic-bi-dataops-copilot
            fi
            cd ~/agentic-bi-dataops-copilot
            cp .env.example .env 2>/dev/null || true

            # ── [2] Add portfolio content/projects entry ──────────────────
            echo "=== [2/6] Portfolio content entry ==="
            CONTENT_DIR=~/justin-portfolio/content/projects/agentic-bi-dataops-copilot
            mkdir -p "$CONTENT_DIR"
            cp ~/agentic-bi-dataops-copilot/portfolio-content/agentic-bi-dataops-copilot/project.override.json "$CONTENT_DIR/"
            cp ~/agentic-bi-dataops-copilot/portfolio-content/agentic-bi-dataops-copilot/en.md "$CONTENT_DIR/"
            cp ~/agentic-bi-dataops-copilot/portfolio-content/agentic-bi-dataops-copilot/zh-TW.md "$CONTENT_DIR/"
            echo "Content files copied."

            # ── [3] Update portfolio nginx.conf (add proxy if not present) ─
            echo "=== [3/6] Portfolio nginx proxy ==="
            NGINX_CONF=~/justin-portfolio/docker/nginx.conf
            if ! grep -q "agentic-bi-dataops-copilot" "$NGINX_CONF" 2>/dev/null; then
              # Insert before the last closing brace
              cat >> "$NGINX_CONF" << 'NGINXBLOCK'

    location = /p/agentic-bi-dataops-copilot {
        return 301 /p/agentic-bi-dataops-copilot/;
    }
    location ^~ /p/agentic-bi-dataops-copilot/api/ {
        proxy_pass http://172.17.0.1:8003/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
    location ^~ /p/agentic-bi-dataops-copilot/ {
        proxy_pass http://172.17.0.1:5173/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
    }
NGINXBLOCK
              echo "Nginx proxy rules added."
            else
              echo "Nginx proxy rules already present."
            fi

            # ── [4] Rebuild portfolio (Next.js export + Docker) ───────────
            echo "=== [4/6] Rebuild portfolio ==="
            cd ~/justin-portfolio
            npm ci --prefer-offline 2>/dev/null || npm install
            npm run build
            docker-compose build --no-cache web
            docker-compose up -d web
            echo "Portfolio rebuilt and restarted."

            # ── [5] Build and start our services ─────────────────────────
            echo "=== [5/6] Build and start BI Copilot services ==="
            cd ~/agentic-bi-dataops-copilot
            docker-compose down 2>/dev/null || true
            docker-compose build --no-cache api
            docker-compose build --no-cache frontend
            API_PORT=8003 docker-compose up -d api
            sleep 8
            API_PORT=8003 docker-compose up -d frontend

            # ── [6] Status check ──────────────────────────────────────────
            echo "=== [6/6] Status check ==="
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" | grep -E "agentic|portfolio-web|NAMES" || true
            curl -s --max-time 10 http://localhost:8003/health && echo " - API healthy" || echo " - API starting..."
            echo ""
            echo "=== Portfolio proxy: https://neojustin.dothost.net/p/agentic-bi-dataops-copilot/ ==="
            echo "=== Deployment complete ==="
