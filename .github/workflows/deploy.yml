name: Deploy to Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: live.dothost.net
          username: neojustin
          password: ${{ secrets.SSH_PASSWORD }}
          port: 2965
          command_timeout: 30m
          script_stop: false
          script: |
            echo "=== PORTFOLIO ROUTING ==="
            echo "--- portfolio Dockerfile ---"
            cat ~/justin-portfolio/Dockerfile 2>/dev/null | head -40
            echo "--- portfolio nginx conf inside container ---"
            cat ~/justin-portfolio/nginx.conf 2>/dev/null | head -80
            find ~/justin-portfolio -name "*.conf" 2>/dev/null | head -5
            echo "--- docker exec nginx conf ---"
            docker exec justin-portfolio-web-1 cat /etc/nginx/nginx.conf 2>/dev/null | head -60
            docker exec justin-portfolio-web-1 ls /etc/nginx/conf.d/ 2>/dev/null
            docker exec justin-portfolio-web-1 cat /etc/nginx/conf.d/default.conf 2>/dev/null | head -80
            echo "--- playwright-demo project.override.json ---"
            cat ~/justin-portfolio/content/projects/playwright-demo/project.override.json 2>/dev/null
            echo "--- retailpulse project.override.json ---"
            cat ~/justin-portfolio/content/projects/retailpulse-bi-recommender/project.override.json 2>/dev/null
            echo "=== DONE ==="
