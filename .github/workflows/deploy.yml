name: Deploy to Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: live.dothost.net
          username: neojustin
          password: ${{ secrets.SSH_PASSWORD }}
          port: 2965
          command_timeout: 30m
          script_stop: false
          script: |
            echo "=== [1/7] Checking project directory ==="
            if [ -d ~/agentic-bi-dataops-copilot ]; then
              cd ~/agentic-bi-dataops-copilot
              git pull origin main
            else
              git clone https://github.com/Justin21523/agentic-bi-dataops-copilot.git ~/agentic-bi-dataops-copilot
              cd ~/agentic-bi-dataops-copilot
            fi
            echo "=== [2/7] Code updated ==="

            cd ~/agentic-bi-dataops-copilot
            cp .env.example .env 2>/dev/null || true

            echo "=== [3/7] Stopping old containers ==="
            docker-compose down 2>/dev/null || true

            echo "=== [4/7] Building API image (no-cache) ==="
            docker-compose build --no-cache api

            echo "=== [5/7] Building Frontend image (no-cache) ==="
            docker-compose build --no-cache frontend

            echo "=== [6/7] Starting services ==="
            API_PORT=8003 docker-compose up -d api
            sleep 5
            API_PORT=8003 docker-compose up -d frontend

            echo "=== [7/7] Status check ==="
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" | grep -E "agentic|NAMES" || docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            curl -s --max-time 10 http://localhost:8003/health && echo " - API healthy" || echo " - API starting up..."
            echo "=== Deployment complete ==="
