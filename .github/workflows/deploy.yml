name: Deploy to Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: live.dothost.net
          username: neojustin
          password: ${{ secrets.SSH_PASSWORD }}
          port: 2965
          command_timeout: 30m
          script_stop: false
          script: |
            echo "=== PORTFOLIO STRUCTURE ==="
            echo "--- docker-compose ai-gen-hub section ---"
            grep -A 25 "ai-gen-hub:" ~/justin-portfolio/docker-compose.yml 2>/dev/null
            echo "--- docker-compose ai-gen-hub-backend section ---"
            grep -A 15 "ai-gen-hub-backend:" ~/justin-portfolio/docker-compose.yml 2>/dev/null
            echo "--- docker-compose first 30 lines ---"
            head -30 ~/justin-portfolio/docker-compose.yml 2>/dev/null
            echo "--- next.config ---"
            cat ~/justin-portfolio/next.config.js 2>/dev/null | head -60
            cat ~/justin-portfolio/next.config.ts 2>/dev/null | head -60
            echo "--- nginx check ---"
            find /etc -name "*.conf" 2>/dev/null | xargs grep -l "3000" 2>/dev/null | head -5
            echo "--- content/projects full list ---"
            ls ~/justin-portfolio/content/projects/ 2>/dev/null
            echo "=== DONE ==="
