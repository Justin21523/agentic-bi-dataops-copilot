name: Deploy to Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  HOST: live.dothost.net
  USERNAME: neojustin
  PORT: 2965
  PROJECT_DIR: /home/neojustin/agentic-bi-dataops-copilot
  PORTFOLIO_DIR: /home/neojustin/justin-portfolio

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Stage 1 - update repo and env
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.HOST }}
          username: ${{ env.USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ env.PORT }}
          command_timeout: 12m
          script_stop: true
          script: |
            set -e
            retry() {
              n=0
              until "$@"; do
                n=$((n+1))
                if [ "$n" -ge 12 ]; then return 1; fi
                echo "retry $n: $*"
                sleep 10
              done
            }

            mkdir -p "${{ env.PROJECT_DIR }}"
            if [ -d "${{ env.PROJECT_DIR }}/.git" ]; then
              cd "${{ env.PROJECT_DIR }}"
              retry git fetch origin main
              git reset --hard origin/main
            else
              rm -rf "${{ env.PROJECT_DIR }}"
              retry git clone https://github.com/Justin21523/agentic-bi-dataops-copilot.git "${{ env.PROJECT_DIR }}"
              cd "${{ env.PROJECT_DIR }}"
            fi

            cat > .env <<'EOF'
            DUCKDB_PATH=data/warehouse.duckdb
            API_HOST=0.0.0.0
            API_PORT=8000
            API_BASE_URL=http://localhost:8000
            LLM_PROVIDER=llama_cpp
            LLAMA_CPP_BASE_URL=http://host.docker.internal:8080/v1
            LLAMA_CPP_MODEL=default
            LOG_LEVEL=INFO
            MAX_ROWS=10000
            QUERY_TIMEOUT=30
            SAMPLE_DATA_PATH=data/sample
            METADATA_CATALOG_PATH=data/metadata/catalog.yaml
            SAMPLE_SEED=42
            SAMPLE_CUSTOMERS=300
            SAMPLE_PRODUCTS=100
            SAMPLE_ORDERS=750
            EOF

            docker system prune -f || true

      - name: Stage 2 - sync portfolio content
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.HOST }}
          username: ${{ env.USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ env.PORT }}
          command_timeout: 12m
          script_stop: true
          script: |
            set -e
            cd "${{ env.PROJECT_DIR }}"

            CONTENT_DIR="${{ env.PORTFOLIO_DIR }}/content/projects/agentic-bi-dataops-copilot"
            PUBDIR="${{ env.PORTFOLIO_DIR }}/public/portfolio/projects/agentic-bi-dataops-copilot"
            mkdir -p "$CONTENT_DIR" "$PUBDIR/screenshots" "$PUBDIR/demo"

            cp portfolio-content/agentic-bi-dataops-copilot/project.override.json "$CONTENT_DIR/"
            cp portfolio-content/agentic-bi-dataops-copilot/en.md "$CONTENT_DIR/"
            cp portfolio-content/agentic-bi-dataops-copilot/zh-TW.md "$CONTENT_DIR/"
            cp portfolio-content/screenshots/*.webp "$PUBDIR/screenshots/"
            cp portfolio-content/screenshots/cover.webp "$PUBDIR/cover.webp"
            cp portfolio-content/demo/demo-tour.webm "$PUBDIR/demo/"
            mkdir -p "${{ env.PORTFOLIO_DIR }}/data/generated"
            cp portfolio-content/project-scan-report.json "${{ env.PORTFOLIO_DIR }}/data/generated/project-scan-report.json"
            python3 portfolio-content/inject-nginx.py

      - name: Stage 3 - rebuild portfolio web
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.HOST }}
          username: ${{ env.USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ env.PORT }}
          command_timeout: 20m
          script_stop: true
          script: |
            set -e
            retry() {
              n=0
              until "$@"; do
                n=$((n+1))
                if [ "$n" -ge 10 ]; then return 1; fi
                echo "retry $n: $*"
                sleep 12
              done
            }

            cd "${{ env.PORTFOLIO_DIR }}"
            python3 - <<'PY'
            from pathlib import Path
            path = Path("scripts/catalog/sync-catalog.ts")
            text = path.read_text()
            text = text.replace(
                'const visibility = override.visibility || "hidden";',
                'const visibility = override.visibility || "public";'
            )
            path.write_text(text)
            for override in Path("content/projects").glob("*/project.override.json"):
                data = override.read_text()
                data = data.replace('"visibility": "hidden"', '"visibility": "public"')
                override.write_text(data)
            nginx = Path("docker/nginx.conf")
            if nginx.exists():
                conf = nginx.read_text()
                start = conf.find("    location = /p/nyc-taxi-mobility-analytics")
                end = conf.find("    location ^~ /api/v1/", start)
                if start != -1 and end != -1:
                    nginx.write_text(conf[:start] + conf[end:])
            PY
            retry npm ci
            npm run build
            retry docker-compose build web
            retry docker-compose up -d web

      - name: Stage 4 - rebuild app services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.HOST }}
          username: ${{ env.USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ env.PORT }}
          command_timeout: 25m
          script_stop: true
          script: |
            set -e
            retry() {
              n=0
              until "$@"; do
                n=$((n+1))
                if [ "$n" -ge 10 ]; then return 1; fi
                echo "retry $n: $*"
                sleep 12
              done
            }

            cd "${{ env.PROJECT_DIR }}"
            docker-compose down || true
            retry docker-compose build api
            retry docker-compose build frontend
            docker run --rm \
              -v "${{ env.PROJECT_DIR }}/data:/app/data" \
              -e PYTHONPATH=/app/src \
              -e DUCKDB_PATH=data/warehouse.duckdb \
              agentic-bi:local \
              uv run python scripts/run_etl.py
            API_PORT=8003 docker-compose up -d api
            API_PORT=8003 docker-compose up -d frontend

      - name: Stage 5 - health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.HOST }}
          username: ${{ env.USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ env.PORT }}
          command_timeout: 10m
          script_stop: true
          script: |
            set -e
            for i in $(seq 1 30); do
              if curl -fsS http://localhost:8003/health; then
                echo "API healthy"
                break
              fi
              echo "waiting for API health: $i"
              sleep 10
            done

            curl -fsS http://localhost:8003/health | grep -q '"llm_provider":"llama_cpp"'
            curl -fsSI https://neojustin.dothost.net/p/agentic-bi-dataops-copilot/ >/dev/null
            grep -l "agentic-bi-dataops-copilot" "${{ env.PORTFOLIO_DIR }}"/src/generated/*.json >/dev/null
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" | grep -E "agentic|portfolio-web|NAMES"
            echo "Live at: https://neojustin.dothost.net/p/agentic-bi-dataops-copilot/"
