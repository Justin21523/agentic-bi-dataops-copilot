name: Deploy to Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: live.dothost.net
          username: neojustin
          password: ${{ secrets.SSH_PASSWORD }}
          port: 2965
          command_timeout: 30m
          script_stop: false
          script: |
            echo "=== SERVER EXPLORE ==="
            echo "--- Home dir ---"
            ls -la ~/
            echo "--- /var/www or /srv ---"
            ls /var/www/ 2>/dev/null || echo "no /var/www"
            ls /srv/ 2>/dev/null || echo "no /srv"
            echo "--- Docker containers ---"
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            echo "--- Nginx sites ---"
            ls /etc/nginx/sites-enabled/ 2>/dev/null || ls /etc/nginx/conf.d/ 2>/dev/null || echo "no nginx config found"
            echo "--- Nginx projects config sample ---"
            cat /etc/nginx/sites-enabled/* 2>/dev/null | head -80 || cat /etc/nginx/conf.d/*.conf 2>/dev/null | head -80 || true
            echo "--- /projects or portfolio dir ---"
            find / -name "projects" -type d -maxdepth 6 2>/dev/null | head -10
            echo "=== DONE ==="
